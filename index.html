<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>اختبارات تفاعلية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <style>
    /* neobrutalism-inspired tokens (typeui.sh) + RTL للطلاب */
    :root {
      --color-primary: #fdc800;
      --color-secondary: #432dd7;
      --color-success: #16a34a;
      --color-warning: #d97706;
      --color-danger: #dc2626;
      --color-surface: #fbfbf9;
      --color-surface-2: #fff;
      --color-text: #1c293c;
      --color-text-muted: #3d5266;
      --color-ink: #0a0f14;
      --border-width: 3px;
      --radius: 6px;
      --shadow: 5px 5px 0 var(--color-ink);
      --shadow-sm: 3px 3px 0 var(--color-ink);
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --font-ui: "Inter", "Cairo", system-ui, sans-serif;
      --font-ar: "Cairo", "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
    * {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ar);
      font-size: 15px;
      line-height: 1.55;
      color: var(--color-text);
      background-color: var(--color-surface);
      background-image: radial-gradient(circle at 100% 0%, rgba(253, 200, 0, 0.18) 0%, transparent 42%),
        radial-gradient(circle at 0% 100%, rgba(67, 45, 215, 0.12) 0%, transparent 45%);
      overflow-x: hidden;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--space-5) var(--space-4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      padding: var(--space-5) 0 var(--space-4);
    }
    header h1 {
      margin: 0;
      font-family: var(--font-ar);
      font-size: clamp(1.35rem, 4vw, 1.7rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--color-text);
      display: inline-block;
      padding: var(--space-3) var(--space-5);
      background: var(--color-primary);
      border: var(--border-width) solid var(--color-ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transform: rotate(-0.5deg);
    }
    header p {
      margin: var(--space-4) 0 0;
      color: var(--color-text-muted);
      font-size: 15px;
      font-weight: 600;
      max-width: 36em;
      margin-inline: auto;
    }
    .screen {
      display: none;
      flex: 1;
      animation: popIn 0.35s ease;
    }
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .card {
      background: var(--color-surface-2);
      border: var(--border-width) solid var(--color-ink);
      border-radius: var(--radius);
      padding: var(--space-5);
      box-shadow: var(--shadow);
      border-top: 8px solid var(--color-secondary);
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: var(--space-2);
      color: var(--color-text);
      font-size: 13px;
      text-transform: none;
    }
    select,
    input[type="text"] {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      border: var(--border-width) solid var(--color-ink);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-ar);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: var(--space-4);
      box-shadow: var(--shadow-sm);
    }
    select:focus,
    input[type="text"]:focus {
      outline: none;
      box-shadow: var(--shadow-sm), 0 0 0 3px var(--color-secondary);
    }
    select:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      border: var(--border-width) solid var(--color-ink);
      font-family: var(--font-ar);
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.15s ease, opacity 0.15s;
    }
    .btn:focus-visible {
      outline: 3px solid var(--color-secondary);
      outline-offset: 2px;
    }
    .btn:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--color-ink);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-ink);
    }
    .btn-primary.block-full {
      width: 100%;
      margin-top: var(--space-3);
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.05);
    }
    .btn-ghost {
      background: var(--color-surface);
      color: var(--color-text);
    }
    .btn-ghost:hover:not(:disabled) {
      background: #eee;
    }
    .btn-choice {
      width: 100%;
      text-align: start;
      justify-content: flex-start;
      background: var(--color-surface-2);
      color: var(--color-text);
      margin-bottom: var(--space-3);
      font-weight: 700;
      unicode-bidi: isolate;
    }
    .btn-choice:hover:not(:disabled) {
      background: #fff9e6;
      border-color: var(--color-secondary);
    }
    .btn-choice.correct {
      border-color: var(--color-success);
      background: #dcfce7;
      color: #14532d;
    }
    .btn-choice.wrong {
      border-color: var(--color-danger);
      background: #fee2e2;
      color: #7f1d1d;
    }
    .row {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }
    .row .btn {
      flex: 1;
      width: auto;
      margin-top: 0;
    }
    .progress-wrap {
      margin-bottom: var(--space-4);
    }
    .progress-bar {
      height: 14px;
      border-radius: 999px;
      background: #e2e8f0;
      border: var(--border-width) solid var(--color-ink);
      overflow: hidden;
      box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.06);
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: repeating-linear-gradient(
        -45deg,
        var(--color-primary),
        var(--color-primary) 8px,
        #f59e0b 8px,
        #f59e0b 16px
      );
      width: 0%;
      transition: width 0.35s ease;
      border-right: 2px solid var(--color-ink);
    }
    [dir="rtl"] .progress-fill {
      border-right: none;
      border-left: 2px solid var(--color-ink);
    }
    .progress-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text-muted);
      margin-top: var(--space-2);
      text-align: center;
      font-family: var(--font-ui);
    }
    .q-body {
      font-size: 17px;
      line-height: 1.75;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-4);
      padding: var(--space-4);
      background: var(--color-surface);
      border: var(--border-width) solid var(--color-ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      unicode-bidi: isolate;
      text-align: start;
    }
    .feedback {
      display: none;
      margin-top: var(--space-4);
      padding: var(--space-4);
      border-radius: var(--radius);
      font-weight: 700;
      border: var(--border-width) solid var(--color-ink);
      box-shadow: var(--shadow-sm);
      unicode-bidi: isolate;
      text-align: start;
    }
    .feedback.show {
      display: block;
    }
    .feedback.ok {
      background: #dcfce7;
      color: #14532d;
      border-color: var(--color-success);
    }
    .feedback.bad {
      background: #fee2e2;
      color: #7f1d1d;
      border-color: var(--color-danger);
    }
    .alert {
      padding: var(--space-4);
      border-radius: var(--radius);
      border: var(--border-width) solid var(--color-danger);
      background: #fee2e2;
      color: #7f1d1d;
      margin-bottom: var(--space-4);
      font-size: 14px;
      line-height: 1.6;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }
    .alert--warning {
      border-color: var(--color-warning);
      background: #fffbeb;
      color: #78350f;
      margin-top: var(--space-4);
      margin-bottom: 0;
    }
    .result-score {
      text-align: center;
      padding: var(--space-4) 0;
    }
    .result-score .big {
      font-size: clamp(2.25rem, 8vw, 2.75rem);
      font-weight: 800;
      font-family: var(--font-ui);
      color: var(--color-secondary);
      text-shadow: 2px 2px 0 var(--color-primary);
    }
    .text-muted {
      color: var(--color-text-muted);
      font-weight: 600;
      font-size: 15px;
    }
    .section-title {
      margin: 0 0 var(--space-3);
      font-size: 17px;
      font-weight: 800;
      padding-bottom: var(--space-2);
      border-bottom: var(--border-width) solid var(--color-ink);
    }
    .circle-wrap {
      display: flex;
      justify-content: center;
      margin: var(--space-4) 0 var(--space-5);
    }
    .circle {
      --p: 0;
      width: 144px;
      height: 144px;
      border-radius: 50%;
      background: conic-gradient(var(--color-primary) calc(var(--p) * 1%), #e2e8f0 0);
      display: grid;
      place-items: center;
      border: var(--border-width) solid var(--color-ink);
      box-shadow: var(--shadow);
    }
    .circle-inner {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: var(--color-surface-2);
      display: grid;
      place-items: center;
      font-size: 21px;
      font-weight: 800;
      font-family: var(--font-ui);
      color: var(--color-text);
      border: var(--border-width) solid var(--color-ink);
    }
    .review-item {
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-3);
      border-radius: var(--radius);
      border: var(--border-width) solid var(--color-ink);
      font-size: 14px;
      background: var(--color-surface);
      box-shadow: 2px 2px 0 var(--color-ink);
    }
    .review-item.ok {
      border-color: var(--color-success);
      background: #f0fdf4;
    }
    .review-item.bad {
      border-color: var(--color-danger);
      background: #fef2f2;
    }
    .review-q {
      font-weight: 800;
      margin-bottom: var(--space-2);
      color: var(--color-text);
      unicode-bidi: isolate;
      text-align: start;
    }
    footer {
      text-align: center;
      padding: var(--space-5) var(--space-2);
      font-size: 13px;
      color: var(--color-text-muted);
      font-weight: 600;
    }
    footer code {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 2px 6px;
      background: var(--color-surface-2);
      border: 2px solid var(--color-ink);
      border-radius: 4px;
    }
    .mt-lg {
      margin-top: var(--space-4);
    }
    .live-score {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: center;
      align-items: stretch;
      margin-bottom: var(--space-4);
    }
    .live-score__box {
      flex: 1 1 140px;
      min-width: 0;
      padding: var(--space-3) var(--space-4);
      border: var(--border-width) solid var(--color-ink);
      border-radius: var(--radius);
      background: var(--color-primary);
      box-shadow: var(--shadow-sm);
      font-weight: 800;
      font-size: 14px;
      text-align: center;
      color: var(--color-ink);
    }
    .live-score__box em {
      font-style: normal;
      display: block;
      font-size: clamp(1.35rem, 5vw, 1.85rem);
      font-family: var(--font-ui);
      margin-top: var(--space-1);
      line-height: 1.2;
    }
    .live-score__box--muted {
      background: var(--color-surface-2);
      border-color: var(--color-secondary);
    }
    .celebration-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }
    .cele-shape {
      position: absolute;
      bottom: -24px;
      opacity: 0;
      animation: celeFloat 1.1s ease-out forwards;
    }
    @keyframes celeFloat {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.4);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translateY(-72vh) rotate(var(--rot, 180deg)) scale(1);
        opacity: 0;
      }
    }
    .cele-shape--sq {
      width: 18px;
      height: 18px;
      border: 3px solid var(--color-ink);
      background: var(--color-primary);
      box-shadow: 3px 3px 0 var(--color-ink);
    }
    .cele-shape--sq.alt {
      background: var(--color-secondary);
    }
    .cele-shape--circ {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 3px solid var(--color-ink);
      background: var(--color-success);
      box-shadow: 3px 3px 0 var(--color-ink);
    }
    .cele-shape--star {
      font-size: 26px;
      line-height: 1;
      filter: drop-shadow(2px 2px 0 var(--color-ink));
    }
    .cele-burst {
      position: absolute;
      left: var(--bx, 50%);
      top: var(--by, 70%);
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      pointer-events: none;
    }
    .cele-ring {
      position: absolute;
      inset: 0;
      border: var(--border-width) solid var(--color-success);
      border-radius: 50%;
      animation: celeRing 0.65s ease-out forwards;
      opacity: 0.9;
    }
    @keyframes celeRing {
      0% {
        transform: scale(0.2);
        opacity: 1;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }
    .cele-check {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 56px;
      font-weight: 900;
      color: var(--color-success);
      text-shadow: 3px 3px 0 var(--color-ink);
      animation: celePop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes celePop {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(-25deg);
      }
      70% {
        transform: translate(-50%, -50%) scale(1.08) rotate(8deg);
      }
      100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
    }
  </style>
</head>
<body>
  <div id="celebration-root" class="celebration-root" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <h1>اختبارات تفاعلية</h1>
      <p>اختر مرحلتك والفصل والاختبار، ثم حل الأسئلة خطوة بخطوة</p>
    </header>

    <div id="load-error" class="alert" style="display: none;"></div>

    <!-- شاشة الاختيار -->
    <section id="screen-select" class="screen active">
      <div class="card">
        <label for="sel-stage">المرحلة</label>
        <select id="sel-stage"><option value="">— اختر المرحلة —</option></select>

        <label for="sel-grade">الصف</label>
        <select id="sel-grade" disabled><option value="">— اختر الصف —</option></select>

        <label for="sel-term">الفصل الدراسي</label>
        <select id="sel-term" disabled><option value="">— اختر الفصل —</option></select>

        <label for="sel-quiz">الاختبار</label>
        <select id="sel-quiz" disabled><option value="">— اختر الاختبار —</option></select>

        <button type="button" class="btn btn-primary block-full" id="btn-start" disabled>ابدأ الاختبار</button>
        <div id="pending-box" class="alert alert--warning" style="display: none"></div>
      </div>
    </section>

    <!-- شاشة الاختبار -->
    <section id="screen-quiz" class="screen">
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="progress-text" id="progress-text"></div>
        </div>
        <div class="live-score" id="live-score" aria-live="polite">
          <div class="live-score__box">
            إجابات صحيحة
            <em id="live-correct">0</em>
          </div>
          <div class="live-score__box live-score__box--muted">
            أجبت على
            <em><span id="live-answered">0</span> / <span id="live-total">0</span></em>
          </div>
        </div>
        <div class="q-body" id="q-text"></div>
        <div id="q-mcq"></div>
        <div id="q-text-wrap" style="display: none;">
          <input type="text" id="q-input" autocomplete="off" placeholder="اكتب إجابتك هنا" />
          <button type="button" class="btn btn-primary block-full" id="btn-check">تحقق من الإجابة</button>
        </div>
        <div class="feedback" id="feedback" role="status"></div>
        <div class="row">
          <button type="button" class="btn btn-ghost" id="btn-prev">السابق</button>
          <button type="button" class="btn btn-primary" id="btn-next" disabled>التالي</button>
        </div>
      </div>
    </section>

    <!-- شاشة النتيجة -->
    <section id="screen-result" class="screen">
      <div class="card">
        <div class="result-score">
          <div class="big" id="score-line"></div>
          <p id="score-sub" class="text-muted" style="margin: 0.5rem 0 0"></p>
        </div>
        <div class="circle-wrap">
          <div class="circle" id="score-circle" style="--p: 0">
            <div class="circle-inner" id="score-pct">0%</div>
          </div>
        </div>
        <h2 class="section-title">مراجعة الإجابات</h2>
        <div id="review-list"></div>
        <button type="button" class="btn btn-primary block-full mt-lg" id="btn-restart">اختبار جديد</button>
      </div>
    </section>

    <footer>ضع ملفات JSON داخل مجلد <code>json/</code> وحدّث <code>json/index.json</code></footer>
  </div>

  <script>
    const JSON_BASE = "json/";
    let indexData = null;
    let questions = [];
    let currentIndex = 0;
    let results = [];
    /** اسم ملف JSON الحالي (لتخمين لغة المادة: إنجليزي، فرنسي، عربي…) */
    let currentQuizFile = "";

    function updateLiveScore() {
      const total = results.length;
      const answered = results.filter((r) => r.correct !== null).length;
      const correct = results.filter((r) => r.correct === true).length;
      const elC = document.getElementById("live-correct");
      const elA = document.getElementById("live-answered");
      const elT = document.getElementById("live-total");
      if (elC) elC.textContent = String(correct);
      if (elA) elA.textContent = String(answered);
      if (elT) elT.textContent = String(total);
    }

    /** أشكال وحركة عند إجابة صحيحة */
    function playCorrectCelebration() {
      const root = document.getElementById("celebration-root");
      if (!root) return;
      root.innerHTML = "";

      const burst = document.createElement("div");
      burst.className = "cele-burst";
      burst.style.setProperty("--bx", "50%");
      burst.style.setProperty("--by", "42%");
      const ring = document.createElement("div");
      ring.className = "cele-ring";
      const check = document.createElement("div");
      check.className = "cele-check";
      check.textContent = "✓";
      burst.appendChild(ring);
      burst.appendChild(check);
      root.appendChild(burst);

      const kinds = ["sq", "sq alt", "circ", "star"];
      const count = 14;
      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        const k = kinds[i % kinds.length];
        if (k === "star") {
          el.className = "cele-shape cele-shape--star";
          el.textContent = i % 2 === 0 ? "★" : "✦";
        } else {
          el.className = "cele-shape cele-shape--" + k.split(" ")[0] + (k.includes("alt") ? " alt" : "");
        }
        const left = 8 + Math.random() * 84;
        el.style.left = left + "%";
        el.style.animationDelay = (Math.random() * 0.12).toFixed(2) + "s";
        el.style.setProperty("--rot", (Math.random() * 540 - 180).toFixed(0) + "deg");
        root.appendChild(el);
      }

      window.setTimeout(() => {
        root.innerHTML = "";
      }, 1200);
    }

    function norm(s) {
      return String(s ?? "")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    /** عد حروف عربية مقابل لاتينية (مواد أجنبية / عربي) */
    function countArabicLatinLetters(s) {
      const str = String(s ?? "");
      let ar = 0;
      let lat = 0;
      for (let i = 0; i < str.length; i++) {
        const cp = str.codePointAt(i);
        if (cp >= 0x10000) i++;
        if (
          (cp >= 0x0600 && cp <= 0x06ff) ||
          (cp >= 0x0750 && cp <= 0x077f) ||
          (cp >= 0x08a0 && cp <= 0x08ff) ||
          (cp >= 0xfb50 && cp <= 0xfdff) ||
          (cp >= 0xfe70 && cp <= 0xfeff)
        ) {
          ar++;
          continue;
        }
        if (
          (cp >= 0x0041 && cp <= 0x005a) ||
          (cp >= 0x0061 && cp <= 0x007a) ||
          (cp >= 0x00c0 && cp <= 0x024f) ||
          (cp >= 0x1e00 && cp <= 0x1eff)
        ) {
          lat++;
        }
      }
      return { ar, lat };
    }

    function isLatinSubjectFile(name) {
      const n = String(name || "").toLowerCase();
      if (n.includes("ict_arabic") || /\barabic\b/.test(n)) return false;
      return (
        n.includes("english") ||
        n.includes("eglish") ||
        n.includes("deutsch") ||
        n.includes("french") ||
        n.includes("espanol") ||
        n.includes("espan") ||
        n.includes("italiano") ||
        n.includes("italian")
      );
    }

    function isArabicSubjectFile(name) {
      const n = String(name || "").toLowerCase();
      return n.includes("ict_arabic") || n.includes("arabic") || n.includes("_arab_");
    }

    /**
     * اتجاه النص: يعتمد على نسبة الحروف في النص، مع تلميح من اسم الملف (مادة إنجليزي/فرنسي…).
     */
    function dirForText(text, quizFile) {
      const { ar, lat } = countArabicLatinLetters(text);
      const letters = ar + lat;
      const file = String(quizFile || "");
      const latinCourse = isLatinSubjectFile(file);
      const arabicCourse = isArabicSubjectFile(file);

      if (letters === 0) {
        if (latinCourse) return "ltr";
        if (arabicCourse) return "rtl";
        return "rtl";
      }
      if (lat > ar * 1.2) return "ltr";
      if (ar > lat * 1.2) return "rtl";
      if (latinCourse && lat >= ar) return "ltr";
      if (arabicCourse && ar >= lat) return "rtl";
      return lat >= ar ? "ltr" : "rtl";
    }

    function langForLtrFromFilename(filename) {
      const n = String(filename || "").toLowerCase();
      if (n.includes("french")) return "fr";
      if (n.includes("deutsch")) return "de";
      if (n.includes("espanol") || n.includes("espan")) return "es";
      if (n.includes("italiano") || n.includes("italian")) return "it";
      return "en";
    }

    function applyTextDirection(el, text) {
      if (!el) return;
      const d = dirForText(text, currentQuizFile);
      el.setAttribute("dir", d);
      if (d === "ltr") el.setAttribute("lang", langForLtrFromFilename(currentQuizFile));
      else el.setAttribute("lang", "ar");
    }

    /**
     * يستخرج خيارات الاختيار من متعدد من آخر أقواس تحتوي على فواصل – أو -
     * ويعيد نص السؤال بدون تلك الأقواس لأن الخيارات تُعرض كأزرار تحت.
     */
    function parseMultipleChoice(questionText) {
      const re = /\(([^)]+)\)/g;
      let m;
      let best = null;
      while ((m = re.exec(questionText)) !== null) {
        const inner = m[1];
        if (!/[–\-]/.test(inner)) continue;
        const parts = inner.split(/\s*[–\-]\s*/).map((s) => s.trim()).filter(Boolean);
        if (parts.length < 2) continue;
        best = { full: m[0], index: m.index, parts };
      }
      if (!best) return null;
      const stem =
        (questionText.slice(0, best.index) + questionText.slice(best.index + best.full.length))
          .replace(/\s+$/, "")
          .trim();
      return { choices: best.parts, stem: stem || questionText };
    }

    function buildQuestionsFromObject(obj) {
      const out = [];
      for (const [q, a] of Object.entries(obj)) {
        const parsed = parseMultipleChoice(q);
        out.push({
          question: q,
          displayQuestion: parsed ? parsed.stem : q,
          answer: a,
          choices: parsed ? parsed.choices : null,
        });
      }
      return out;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach((el) => el.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function setLoadError(msg) {
      const el = document.getElementById("load-error");
      el.style.display = "block";
      el.innerHTML = msg;
    }

    async function loadIndex() {
      const res = await fetch(JSON_BASE + "index.json");
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    async function loadQuiz(filename) {
      const res = await fetch(JSON_BASE + encodeURIComponent(filename));
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    function fillSelect(el, options, placeholder) {
      el.innerHTML = "";
      const ph = document.createElement("option");
      ph.value = "";
      ph.textContent = placeholder;
      el.appendChild(ph);
      for (const o of options) {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = o;
        el.appendChild(opt);
      }
    }

    function getNestedKeys(obj) {
      return obj && typeof obj === "object" ? Object.keys(obj) : [];
    }

    /** مفاتيح المراحل فقط (يتجاهل المصفوفات ومفاتيح تبدأ بـ _) */
    function getIndexStages(obj) {
      return Object.keys(obj || {}).filter((k) => {
        if (k.startsWith("_")) return false;
        const v = obj[k];
        if (Array.isArray(v)) return false;
        return v && typeof v === "object";
      });
    }

    function initSelectors() {
      const sStage = document.getElementById("sel-stage");
      const sGrade = document.getElementById("sel-grade");
      const sTerm = document.getElementById("sel-term");
      const sQuiz = document.getElementById("sel-quiz");
      const btnStart = document.getElementById("btn-start");

      fillSelect(sStage, getIndexStages(indexData), "— اختر المرحلة —");
      sGrade.disabled = true;
      sTerm.disabled = true;
      sQuiz.disabled = true;
      fillSelect(sGrade, [], "— اختر الصف —");
      fillSelect(sTerm, [], "— اختر الفصل —");
      fillSelect(sQuiz, [], "— اختر الاختبار —");
      btnStart.disabled = true;

      sStage.addEventListener("change", () => {
        const st = sStage.value;
        fillSelect(sGrade, st ? getNestedKeys(indexData[st]) : [], "— اختر الصف —");
        sGrade.disabled = !st;
        fillSelect(sTerm, [], "— اختر الفصل —");
        fillSelect(sQuiz, [], "— اختر الاختبار —");
        sTerm.disabled = true;
        sQuiz.disabled = true;
        btnStart.disabled = true;
      });

      sGrade.addEventListener("change", () => {
        const st = sStage.value;
        const gr = sGrade.value;
        const terms = st && gr ? getNestedKeys(indexData[st][gr]) : [];
        fillSelect(sTerm, terms, "— اختر الفصل —");
        sTerm.disabled = !gr;
        fillSelect(sQuiz, [], "— اختر الاختبار —");
        sQuiz.disabled = true;
        btnStart.disabled = true;
      });

      sTerm.addEventListener("change", () => {
        const st = sStage.value;
        const gr = sGrade.value;
        const te = sTerm.value;
        const quizzes = st && gr && te ? getNestedKeys(indexData[st][gr][te]) : [];
        fillSelect(sQuiz, quizzes, "— اختر الاختبار —");
        sQuiz.disabled = !te;
        btnStart.disabled = true;
      });

      sQuiz.addEventListener("change", () => {
        btnStart.disabled = !sQuiz.value;
      });

      btnStart.addEventListener("click", async () => {
        const st = sStage.value;
        const gr = sGrade.value;
        const te = sTerm.value;
        const quizLabel = sQuiz.value;
        if (!st || !gr || !te || !quizLabel) return;
        const file = indexData[st][gr][te][quizLabel];
        try {
          currentQuizFile = file;
          const data = await loadQuiz(file);
          questions = buildQuestionsFromObject(data);
          results = questions.map((q) => ({
            question: q.question,
            displayQuestion: q.displayQuestion,
            correctAnswer: q.answer,
            userAnswer: null,
            correct: null,
            choices: q.choices,
          }));
          currentIndex = 0;
          showScreen("screen-quiz");
          updateLiveScore();
          renderQuestion();
        } catch (e) {
          setLoadError("تعذر تحميل ملف الاختبار: " + file + "<br><small>" + String(e) + "</small>");
        }
      });
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      const total = questions.length;
      const pct = total ? ((currentIndex + 1) / total) * 100 : 0;
      document.getElementById("progress-fill").style.width = pct + "%";
      document.getElementById("progress-text").textContent =
        "سؤال " + (currentIndex + 1) + " من " + total;

      const qTextEl = document.getElementById("q-text");
      qTextEl.textContent = q.displayQuestion;
      applyTextDirection(qTextEl, q.displayQuestion);

      const fb = document.getElementById("feedback");
      fb.className = "feedback";
      fb.textContent = "";
      fb.removeAttribute("dir");
      fb.removeAttribute("lang");

      const mcq = document.getElementById("q-mcq");
      const tw = document.getElementById("q-text-wrap");
      const inp = document.getElementById("q-input");
      mcq.innerHTML = "";
      inp.value = "";
      inp.oninput = null;

      const res = results[currentIndex];

      if (q.choices) {
        tw.style.display = "none";
        q.choices.forEach((c) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "btn btn-choice";
          b.textContent = c;
          applyTextDirection(b, c);
          if (res.correct !== null) {
            b.disabled = true;
            if (norm(c) === norm(res.correctAnswer)) b.classList.add("correct");
            else if (norm(c) === norm(res.userAnswer) && !res.correct) b.classList.add("wrong");
          } else {
            b.addEventListener("click", () => onMcqPick(c, b));
          }
          mcq.appendChild(b);
        });
      } else {
        tw.style.display = "block";
        if (res.correct !== null) {
          inp.value = res.userAnswer ?? "";
          inp.disabled = true;
          applyTextDirection(inp, q.displayQuestion + " " + inp.value);
          document.getElementById("btn-check").style.display = "none";
          showFeedback(res);
        } else {
          inp.disabled = false;
          document.getElementById("btn-check").style.display = "block";
          applyTextDirection(inp, q.displayQuestion);
          inp.oninput = () => applyTextDirection(inp, q.displayQuestion + " " + inp.value);
        }
      }

      updateLiveScore();

      document.getElementById("btn-prev").disabled = currentIndex === 0;
      const answered = res.correct !== null;
      document.getElementById("btn-next").disabled = !answered;
      if (currentIndex === total - 1 && answered) {
        document.getElementById("btn-next").textContent = "عرض النتيجة";
      } else {
        document.getElementById("btn-next").textContent = "التالي";
      }
    }

    function showFeedback(res) {
      const fb = document.getElementById("feedback");
      fb.classList.add("show");
      if (res.correct) {
        fb.classList.add("ok");
        fb.textContent = "إجابة صحيحة! أحسنت.";
      } else {
        fb.classList.add("bad");
        fb.textContent =
          "إجابة غير صحيحة. الإجابة الصحيحة: " + String(res.correctAnswer);
      }
      applyTextDirection(fb, fb.textContent);
    }

    function onMcqPick(choice, btnEl) {
      const res = results[currentIndex];
      res.userAnswer = choice;
      res.correct = norm(choice) === norm(res.correctAnswer);
      const mcq = document.getElementById("q-mcq");
      Array.from(mcq.querySelectorAll(".btn-choice")).forEach((b) => {
        b.disabled = true;
        const t = b.textContent;
        if (norm(t) === norm(res.correctAnswer)) b.classList.add("correct");
        else if (b === btnEl && !res.correct) b.classList.add("wrong");
      });
      showFeedback(res);
      updateLiveScore();
      if (res.correct) playCorrectCelebration();
      document.getElementById("btn-next").disabled = false;
      if (currentIndex === questions.length - 1) {
        document.getElementById("btn-next").textContent = "عرض النتيجة";
      }
    }

    document.getElementById("btn-check").addEventListener("click", () => {
      const res = results[currentIndex];
      const inp = document.getElementById("q-input");
      const val = inp.value;
      res.userAnswer = val;
      res.correct = norm(val) === norm(res.correctAnswer);
      inp.disabled = true;
      document.getElementById("btn-check").style.display = "none";
      showFeedback(res);
      updateLiveScore();
      if (res.correct) playCorrectCelebration();
      document.getElementById("btn-next").disabled = false;
      if (currentIndex === questions.length - 1) {
        document.getElementById("btn-next").textContent = "عرض النتيجة";
      }
    });

    document.getElementById("btn-next").addEventListener("click", () => {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    });

    document.getElementById("btn-prev").addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    });

    function showResults() {
      const total = results.length;
      const correct = results.filter((r) => r.correct).length;
      const pct = total ? Math.round((correct / total) * 100) : 0;
      document.getElementById("score-line").textContent = correct + " / " + total;
      document.getElementById("score-sub").textContent = "نسبة النجاح: " + pct + "%";
      document.getElementById("score-circle").style.setProperty("--p", pct);
      document.getElementById("score-pct").textContent = pct + "%";

      const list = document.getElementById("review-list");
      list.innerHTML = "";
      results.forEach((r) => {
        const div = document.createElement("div");
        div.className = "review-item " + (r.correct ? "ok" : "bad");
        div.innerHTML =
          '<div class="review-q">' +
          escapeHtml(r.displayQuestion || r.question) +
          "</div>" +
          "<div>إجابتك: " +
          escapeHtml(String(r.userAnswer ?? "—")) +
          "</div>" +
          (!r.correct
            ? "<div>الصحيح: " + escapeHtml(String(r.correctAnswer)) + "</div>"
            : "");
        list.appendChild(div);
        const rq = div.querySelector(".review-q");
        if (rq) applyTextDirection(rq, r.displayQuestion || r.question);
      });

      showScreen("screen-result");
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderPendingList() {
      const pending = indexData["لم_يُحوّل_بعد"];
      const box = document.getElementById("pending-box");
      if (!box || !Array.isArray(pending) || !pending.length) return;
      box.style.display = "block";
      box.innerHTML =
        "<strong>ملفات PDF لم يُحوّل لها JSON بعد</strong> (" +
        pending.length +
        ") — راجعها في <code>json/index.json</code> تحت المفتاح <code>لم_يُحوّل_بعد</code><br><small style=\"line-height:1.8\">" +
        pending.map((p) => escapeHtml(p)).join(" · ") +
        "</small>";
    }

    document.getElementById("btn-restart").addEventListener("click", () => {
      document.getElementById("load-error").style.display = "none";
      showScreen("screen-select");
    });

    document.getElementById("q-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("btn-check").click();
    });

    (async function boot() {
      try {
        indexData = await loadIndex();
        initSelectors();
        renderPendingList();
      } catch (e) {
        setLoadError(
          "لم يتم تحميل فهرس الاختبارات. إذا فتحت الملف مباشرة من القرص، المتصفح قد يمنع التحميل.<br>" +
            "<strong>الحل:</strong> شغّل <code>serve.bat</code> من نفس المجلد، ثم افتح في المتصفح:<br>" +
            "<code>http://127.0.0.1:8080</code><br><small>" +
            String(e) +
            "</small>"
        );
        document.getElementById("screen-select").classList.remove("active");
      }
    })();
  </script>
</body>
</html>
