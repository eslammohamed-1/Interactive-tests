<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>اختبارات تفاعلية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --color-primary: #00BD7D;
      --color-primary-dark: #009963;
      --color-secondary: #00BD7D;
      --color-success: #16A34A;
      --color-warning: #D97706;
      --color-danger: #DC2626;
      --color-surface: #FFFFFF;
      --color-surface-2: #F9FAFB;
      --color-text: #111827;
      --color-text-muted: #6B7280;
      --color-ink: #111827;
      --color-border: #E5E7EB;
      --border-width: 1px;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-layer: 0 1px 3px rgba(0,0,0,.06), 0 6px 16px rgba(0,0,0,.06);
      --shadow-depth: 0 4px 20px rgba(0,189,125,.12), 0 8px 32px rgba(0,0,0,.08);
      --shadow-raised: 0 12px 40px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.04);
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --font-ui: "Poppins", "Cairo", system-ui, sans-serif;
      --font-ar: "Cairo", "Poppins", system-ui, sans-serif;
      --font-display: "Oswald", "Cairo", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
    * {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ar);
      font-size: 15px;
      line-height: 1.55;
      color: var(--color-text);
      background-color: #F3F4F6;
      background-image:
        linear-gradient(160deg, rgba(0,189,125,.07) 0%, transparent 40%),
        linear-gradient(340deg, rgba(0,189,125,.04) 0%, transparent 50%);
      overflow-x: hidden;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--space-5) var(--space-4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      perspective: 1200px;
    }
    header {
      text-align: center;
      padding: var(--space-6) 0 var(--space-5);
    }
    header h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--color-surface);
      display: inline-block;
      padding: var(--space-3) var(--space-6);
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      border-radius: var(--radius);
      box-shadow: var(--shadow-depth);
      transform: translateZ(0);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    header h1:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-raised);
    }
    header p {
      margin: var(--space-4) 0 0;
      color: var(--color-text-muted);
      font-size: 14px;
      font-weight: 500;
      max-width: 36em;
      margin-inline: auto;
      font-family: var(--font-ui);
    }
    .screen {
      display: none;
      flex: 1;
      animation: screenIn 0.4s cubic-bezier(.4,0,.2,1);
    }
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card {
      background: var(--color-surface);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-5);
      box-shadow: var(--shadow-layer);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      inset-inline-start: 0;
      inset-inline-end: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-dark));
    }
    code {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 2px 6px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: 4px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--color-text);
      font-size: 13px;
      font-family: var(--font-ui);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    select,
    input[type="text"] {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-ar);
      font-size: 15px;
      font-weight: 500;
      margin-bottom: var(--space-4);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.04);
      transition: border-color .2s, box-shadow .2s;
    }
    select:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(0,189,125,.18), inset 0 1px 2px rgba(0,0,0,.04);
    }
    select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-sm);
      border: none;
      font-family: var(--font-ar);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: var(--shadow-layer);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, opacity .15s;
    }
    .btn:focus-visible {
      outline: 3px solid var(--color-primary);
      outline-offset: 2px;
    }
    .btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      color: #fff;
    }
    .btn-primary.block-full {
      width: 100%;
      margin-top: var(--space-3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: var(--shadow-depth);
    }
    .btn-ghost {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--color-surface-2);
      border-color: var(--color-primary);
    }
    .btn-choice {
      width: 100%;
      text-align: start;
      justify-content: flex-start;
      background: var(--color-surface);
      color: var(--color-text);
      margin-bottom: var(--space-3);
      font-weight: 600;
      border: 1px solid var(--color-border);
      unicode-bidi: isolate;
      padding: var(--space-3) var(--space-4);
    }
    .btn-choice:hover:not(:disabled) {
      background: rgba(0,189,125,.06);
      border-color: var(--color-primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,189,125,.12);
    }
    .btn-choice.correct {
      border-color: var(--color-success);
      background: #ECFDF5;
      color: #065F46;
      box-shadow: inset 0 0 0 1px var(--color-success);
    }
    .btn-choice.wrong {
      border-color: var(--color-danger);
      background: #FEF2F2;
      color: #991B1B;
      box-shadow: inset 0 0 0 1px var(--color-danger);
    }
    .row {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }
    .row .btn {
      flex: 1;
      width: auto;
      margin-top: 0;
    }
    .progress-wrap {
      margin-bottom: var(--space-4);
    }
    .progress-bar {
      height: 10px;
      border-radius: 999px;
      background: #E5E7EB;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.06);
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-dark));
      width: 0%;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }
    [dir="rtl"] .progress-fill {
      border-right: none;
    }
    .progress-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-top: var(--space-2);
      text-align: center;
      font-family: var(--font-ui);
    }
    .q-body {
      font-size: 16px;
      line-height: 1.75;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-4);
      padding: var(--space-4);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      box-shadow: inset 0 1px 3px rgba(0,0,0,.03);
      unicode-bidi: isolate;
      text-align: start;
    }
    .feedback {
      display: none;
      margin-top: var(--space-4);
      padding: var(--space-4);
      border-radius: var(--radius-sm);
      font-weight: 600;
      border: 1px solid transparent;
      unicode-bidi: isolate;
      text-align: start;
    }
    .feedback.show {
      display: block;
    }
    .feedback.ok {
      background: #ECFDF5;
      color: #065F46;
      border-color: #A7F3D0;
    }
    .feedback.bad {
      background: #FEF2F2;
      color: #991B1B;
      border-color: #FECACA;
    }
    .alert {
      padding: var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid #FECACA;
      background: #FEF2F2;
      color: #991B1B;
      margin-bottom: var(--space-4);
      font-size: 14px;
      line-height: 1.6;
      font-weight: 500;
    }
    .result-score {
      text-align: center;
      padding: var(--space-5) 0 var(--space-4);
    }
    .result-score .big {
      font-size: clamp(2.5rem, 8vw, 3rem);
      font-weight: 700;
      font-family: var(--font-display);
      color: var(--color-primary);
      text-shadow: none;
    }
    .text-muted {
      color: var(--color-text-muted);
      font-weight: 500;
      font-size: 14px;
    }
    .section-title {
      margin: 0 0 var(--space-4);
      font-size: 16px;
      font-weight: 700;
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--color-border);
      font-family: var(--font-ui);
    }
    .circle-wrap {
      display: flex;
      justify-content: center;
      margin: var(--space-4) 0 var(--space-5);
    }
    .circle {
      --p: 0;
      width: 144px;
      height: 144px;
      border-radius: 50%;
      background: conic-gradient(var(--color-primary) calc(var(--p) * 1%), #E5E7EB 0);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-depth);
    }
    .circle-inner {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: var(--color-surface);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 700;
      font-family: var(--font-display);
      color: var(--color-text);
      box-shadow: inset 0 2px 6px rgba(0,0,0,.06);
    }
    .review-item {
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-3);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      font-size: 14px;
      background: var(--color-surface);
      transition: transform .15s;
    }
    .review-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-layer);
    }
    .review-item.ok {
      border-color: #A7F3D0;
      background: #ECFDF5;
    }
    .review-item.bad {
      border-color: #FECACA;
      background: #FEF2F2;
    }
    .review-q {
      font-weight: 700;
      margin-bottom: var(--space-2);
      color: var(--color-text);
      unicode-bidi: isolate;
      text-align: start;
    }
    .mt-lg {
      margin-top: var(--space-4);
    }
    .live-score {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: center;
      align-items: stretch;
      margin-bottom: var(--space-4);
    }
    .live-score__box {
      flex: 1 1 140px;
      min-width: 0;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      box-shadow: var(--shadow-layer);
      font-weight: 700;
      font-size: 13px;
      text-align: center;
      color: var(--color-text);
      font-family: var(--font-ui);
    }
    .live-score__box em {
      font-style: normal;
      display: block;
      font-size: clamp(1.35rem, 5vw, 1.85rem);
      font-family: var(--font-display);
      margin-top: var(--space-1);
      line-height: 1.2;
      color: var(--color-primary);
    }
    .live-score__box--muted em {
      color: var(--color-text);
    }
    .celebration-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }
    .cele-shape {
      position: absolute;
      bottom: -24px;
      opacity: 0;
      animation: celeFloat 1.1s ease-out forwards;
    }
    @keyframes celeFloat {
      0% { transform: translateY(0) rotate(0deg) scale(0.4); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translateY(-72vh) rotate(var(--rot, 180deg)) scale(1); opacity: 0; }
    }
    .cele-shape--sq {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: var(--color-primary);
      box-shadow: 0 2px 6px rgba(0,189,125,.35);
    }
    .cele-shape--sq.alt {
      background: var(--color-primary-dark);
    }
    .cele-shape--circ {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--color-success);
      box-shadow: 0 2px 6px rgba(22,163,74,.35);
    }
    .cele-shape--star {
      font-size: 22px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,189,125,.3));
    }
    .cele-burst {
      position: absolute;
      left: var(--bx, 50%);
      top: var(--by, 70%);
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      pointer-events: none;
    }
    .cele-ring {
      position: absolute;
      inset: 0;
      border: 2px solid var(--color-primary);
      border-radius: 50%;
      animation: celeRing 0.65s ease-out forwards;
      opacity: 0.7;
    }
    @keyframes celeRing {
      0% { transform: scale(0.2); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .cele-check {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 52px;
      font-weight: 700;
      color: var(--color-primary);
      text-shadow: 0 4px 12px rgba(0,189,125,.3);
      animation: celePop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes celePop {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-25deg); }
      70% { transform: translate(-50%, -50%) scale(1.08) rotate(8deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }
    .landing-list {
      list-style: none;
      margin: 0 0 var(--space-5);
      padding: 0;
    }
    .landing-list li {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      font-weight: 600;
      font-size: 15px;
      color: var(--color-text);
      box-shadow: var(--shadow-layer);
      transition: transform .15s, box-shadow .15s;
    }
    .landing-list li:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-depth);
    }
    .landing-list li:last-child {
      margin-bottom: 0;
    }
    .landing-stage-cell {
      min-width: 0;
    }
    .landing-stage-title {
      display: block;
      font-weight: 700;
    }
    .landing-wip {
      margin: 6px 0 0;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-warning);
      line-height: 1.45;
    }
    .landing-list .landing-count {
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      white-space: nowrap;
      font-family: var(--font-ui);
    }
    .landing-list .landing-count strong {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--color-surface);
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      min-width: 36px;
      height: 36px;
      border-radius: 50%;
      margin-inline-start: 6px;
    }
    .landing-credit {
      margin: var(--space-4) 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      font-family: var(--font-ui);
    }
  </style>
</head>
<body>
  <div id="celebration-root" class="celebration-root" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <h1>اختبارات تفاعلية</h1>
      <p id="header-desc">اطّلع على المراحل، ثم اضغط دخول لاختيار التقييم</p>
    </header>

    <div id="load-error" class="alert" style="display: none;"></div>

    <!-- شاشة بسيطة: مرحلة + عدد التقييمات -->
    <section id="screen-landing" class="screen active">
      <div class="card landing-card-simple">
        <ul class="landing-list" id="landing-stages-list"></ul>
        <p class="landing-credit">تصميم اسلام محمد</p>
        <button type="button" class="btn btn-primary block-full" id="btn-enter-app">دخول</button>
      </div>
    </section>

    <!-- شاشة الاختيار -->
    <section id="screen-select" class="screen">
      <div class="card">
        <label for="sel-stage">المرحلة</label>
        <select id="sel-stage"><option value="">— اختر المرحلة —</option></select>

        <label for="sel-grade">الصف</label>
        <select id="sel-grade" disabled><option value="">— اختر الصف —</option></select>

        <label for="sel-term">الفصل الدراسي</label>
        <select id="sel-term" disabled><option value="">— اختر الفصل —</option></select>

        <label for="sel-quiz">الاختبار</label>
        <select id="sel-quiz" disabled><option value="">— اختر الاختبار —</option></select>

        <button type="button" class="btn btn-primary block-full" id="btn-start" disabled>ابدأ الاختبار</button>
      </div>
    </section>

    <!-- شاشة الاختبار -->
    <section id="screen-quiz" class="screen">
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="progress-text" id="progress-text"></div>
        </div>
        <div class="live-score" id="live-score" aria-live="polite">
          <div class="live-score__box">
            إجابات صحيحة
            <em id="live-correct">0</em>
          </div>
          <div class="live-score__box live-score__box--muted">
            أجبت على
            <em><span id="live-answered">0</span> / <span id="live-total">0</span></em>
          </div>
        </div>
        <div class="q-body" id="q-text"></div>
        <div id="q-mcq"></div>
        <div id="q-text-wrap" style="display: none;">
          <input type="text" id="q-input" autocomplete="off" placeholder="اكتب إجابتك هنا" />
          <button type="button" class="btn btn-primary block-full" id="btn-check">تحقق من الإجابة</button>
        </div>
        <div class="feedback" id="feedback" role="status"></div>
        <div class="row">
          <button type="button" class="btn btn-ghost" id="btn-prev">السابق</button>
          <button type="button" class="btn btn-primary" id="btn-next" disabled>التالي</button>
        </div>
      </div>
    </section>

    <!-- شاشة النتيجة -->
    <section id="screen-result" class="screen">
      <div class="card">
        <div class="result-score">
          <div class="big" id="score-line"></div>
          <p id="score-sub" class="text-muted" style="margin: 0.5rem 0 0"></p>
        </div>
        <div class="circle-wrap">
          <div class="circle" id="score-circle" style="--p: 0">
            <div class="circle-inner" id="score-pct">0%</div>
          </div>
        </div>
        <h2 class="section-title">مراجعة الإجابات</h2>
        <div id="review-list"></div>
        <button type="button" class="btn btn-primary block-full mt-lg" id="btn-restart">اختبار جديد</button>
      </div>
    </section>

  </div>

  <script>
    const JSON_BASE = "json/";
    let indexData = null;
    let questions = [];
    let currentIndex = 0;
    let results = [];
    /** اسم ملف JSON الحالي (لتخمين لغة المادة: إنجليزي، فرنسي، عربي…) */
    let currentQuizFile = "";

    function updateLiveScore() {
      const total = results.length;
      const answered = results.filter((r) => r.correct !== null).length;
      const correct = results.filter((r) => r.correct === true).length;
      const elC = document.getElementById("live-correct");
      const elA = document.getElementById("live-answered");
      const elT = document.getElementById("live-total");
      if (elC) elC.textContent = String(correct);
      if (elA) elA.textContent = String(answered);
      if (elT) elT.textContent = String(total);
    }

    /** أشكال وحركة عند إجابة صحيحة */
    function playCorrectCelebration() {
      const root = document.getElementById("celebration-root");
      if (!root) return;
      root.innerHTML = "";

      const burst = document.createElement("div");
      burst.className = "cele-burst";
      burst.style.setProperty("--bx", "50%");
      burst.style.setProperty("--by", "42%");
      const ring = document.createElement("div");
      ring.className = "cele-ring";
      const check = document.createElement("div");
      check.className = "cele-check";
      check.textContent = "✓";
      burst.appendChild(ring);
      burst.appendChild(check);
      root.appendChild(burst);

      const kinds = ["sq", "sq alt", "circ", "star"];
      const count = 14;
      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        const k = kinds[i % kinds.length];
        if (k === "star") {
          el.className = "cele-shape cele-shape--star";
          el.textContent = i % 2 === 0 ? "★" : "✦";
        } else {
          el.className = "cele-shape cele-shape--" + k.split(" ")[0] + (k.includes("alt") ? " alt" : "");
        }
        const left = 8 + Math.random() * 84;
        el.style.left = left + "%";
        el.style.animationDelay = (Math.random() * 0.12).toFixed(2) + "s";
        el.style.setProperty("--rot", (Math.random() * 540 - 180).toFixed(0) + "deg");
        root.appendChild(el);
      }

      window.setTimeout(() => {
        root.innerHTML = "";
      }, 1200);
    }

    function norm(s) {
      return String(s ?? "")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    /** عد حروف عربية مقابل لاتينية (مواد أجنبية / عربي) */
    function countArabicLatinLetters(s) {
      const str = String(s ?? "");
      let ar = 0;
      let lat = 0;
      for (let i = 0; i < str.length; i++) {
        const cp = str.codePointAt(i);
        if (cp >= 0x10000) i++;
        if (
          (cp >= 0x0600 && cp <= 0x06ff) ||
          (cp >= 0x0750 && cp <= 0x077f) ||
          (cp >= 0x08a0 && cp <= 0x08ff) ||
          (cp >= 0xfb50 && cp <= 0xfdff) ||
          (cp >= 0xfe70 && cp <= 0xfeff)
        ) {
          ar++;
          continue;
        }
        if (
          (cp >= 0x0041 && cp <= 0x005a) ||
          (cp >= 0x0061 && cp <= 0x007a) ||
          (cp >= 0x00c0 && cp <= 0x024f) ||
          (cp >= 0x1e00 && cp <= 0x1eff)
        ) {
          lat++;
        }
      }
      return { ar, lat };
    }

    function isLatinSubjectFile(name) {
      const n = String(name || "").toLowerCase();
      if (n.includes("ict_arabic") || /\barabic\b/.test(n)) return false;
      return (
        n.includes("english") ||
        n.includes("eglish") ||
        n.includes("deutsch") ||
        n.includes("french") ||
        n.includes("espanol") ||
        n.includes("espan") ||
        n.includes("italiano") ||
        n.includes("italian")
      );
    }

    function isArabicSubjectFile(name) {
      const n = String(name || "").toLowerCase();
      return n.includes("ict_arabic") || n.includes("arabic") || n.includes("_arab_");
    }

    /**
     * اتجاه النص: يعتمد على نسبة الحروف في النص، مع تلميح من اسم الملف (مادة إنجليزي/فرنسي…).
     */
    function dirForText(text, quizFile) {
      const { ar, lat } = countArabicLatinLetters(text);
      const letters = ar + lat;
      const file = String(quizFile || "");
      const latinCourse = isLatinSubjectFile(file);
      const arabicCourse = isArabicSubjectFile(file);

      if (letters === 0) {
        if (latinCourse) return "ltr";
        if (arabicCourse) return "rtl";
        return "rtl";
      }
      if (lat > ar * 1.2) return "ltr";
      if (ar > lat * 1.2) return "rtl";
      if (latinCourse && lat >= ar) return "ltr";
      if (arabicCourse && ar >= lat) return "rtl";
      return lat >= ar ? "ltr" : "rtl";
    }

    function langForLtrFromFilename(filename) {
      const n = String(filename || "").toLowerCase();
      if (n.includes("french")) return "fr";
      if (n.includes("deutsch")) return "de";
      if (n.includes("espanol") || n.includes("espan")) return "es";
      if (n.includes("italiano") || n.includes("italian")) return "it";
      return "en";
    }

    function applyTextDirection(el, text) {
      if (!el) return;
      const d = dirForText(text, currentQuizFile);
      el.setAttribute("dir", d);
      if (d === "ltr") el.setAttribute("lang", langForLtrFromFilename(currentQuizFile));
      else el.setAttribute("lang", "ar");
    }

    /**
     * يستخرج خيارات الاختيار من متعدد من آخر أقواس تحتوي على فواصل – أو -
     * ويعيد نص السؤال بدون تلك الأقواس لأن الخيارات تُعرض كأزرار تحت.
     */
    function parseMultipleChoice(questionText) {
      const re = /\(([^)]+)\)/g;
      let m;
      let best = null;
      while ((m = re.exec(questionText)) !== null) {
        const inner = m[1];
        if (!/[–\-]/.test(inner)) continue;
        const parts = inner.split(/\s*[–\-]\s*/).map((s) => s.trim()).filter(Boolean);
        if (parts.length < 2) continue;
        best = { full: m[0], index: m.index, parts };
      }
      if (!best) return null;
      const stem =
        (questionText.slice(0, best.index) + questionText.slice(best.index + best.full.length))
          .replace(/\s+$/, "")
          .trim();
      return { choices: best.parts, stem: stem || questionText };
    }

    function buildQuestionsFromObject(obj) {
      const out = [];
      for (const [q, a] of Object.entries(obj)) {
        const parsed = parseMultipleChoice(q);
        out.push({
          question: q,
          displayQuestion: parsed ? parsed.stem : q,
          answer: a,
          choices: parsed ? parsed.choices : null,
        });
      }
      return out;
    }

    /** تنسيق المعالج الآلي: مصفوفة من { question, options[], correct_answer } */
    function unwrapQuizPayload(data) {
      if (Array.isArray(data)) return data;
      if (data && typeof data === "object" && Array.isArray(data.questions)) return data.questions;
      return data;
    }

    function normalizeQuizItem(item) {
      if (!item || typeof item !== "object") return null;
      const qRaw = item.question;
      if (qRaw == null || String(qRaw).trim() === "") return null;
      const q = String(qRaw);
      const ans =
        item.correct_answer != null
          ? item.correct_answer
          : item.answer != null
            ? item.answer
            : "";
      const opts = Array.isArray(item.options)
        ? item.options.map((x) => String(x)).filter((x) => x.length > 0)
        : [];
      if (opts.length >= 2) {
        return {
          question: q,
          displayQuestion: q,
          answer: String(ans),
          choices: opts,
        };
      }
      const parsed = parseMultipleChoice(q);
      return {
        question: q,
        displayQuestion: parsed ? parsed.stem : q,
        answer: String(ans),
        choices: parsed ? parsed.choices : null,
      };
    }

    function normalizeLoadedQuiz(data) {
      const raw = unwrapQuizPayload(data);
      if (Array.isArray(raw)) {
        const out = [];
        for (const item of raw) {
          const row = normalizeQuizItem(item);
          if (row) out.push(row);
        }
        return out;
      }
      if (raw && typeof raw === "object" && !Array.isArray(raw)) {
        return buildQuestionsFromObject(raw);
      }
      return [];
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach((el) => el.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function setLoadError(msg) {
      const el = document.getElementById("load-error");
      el.style.display = "block";
      el.innerHTML = msg;
    }

    async function loadIndex() {
      const res = await fetch(JSON_BASE + "index.json");
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    async function loadQuiz(filename) {
      const res = await fetch(JSON_BASE + encodeURIComponent(filename));
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    function fillSelect(el, options, placeholder) {
      el.innerHTML = "";
      const ph = document.createElement("option");
      ph.value = "";
      ph.textContent = placeholder;
      el.appendChild(ph);
      for (const o of options) {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = o;
        el.appendChild(opt);
      }
    }

    function getNestedKeys(obj) {
      return obj && typeof obj === "object" ? Object.keys(obj) : [];
    }

    /** مفاتيح المراحل فقط (يتجاهل المصفوفات ومفاتيح تبدأ بـ _) */
    function getIndexStages(obj) {
      return Object.keys(obj || {}).filter((k) => {
        if (k.startsWith("_")) return false;
        const v = obj[k];
        if (Array.isArray(v)) return false;
        return v && typeof v === "object";
      });
    }

    /** عدّ ملفات الاختبار (أوراق الفهرس الأخيرة: عنوان → اسم ملف) تحت شجرة مرحلة */
    function countQuizLeaves(node) {
      if (!node || typeof node !== "object" || Array.isArray(node)) return 0;
      const vals = Object.values(node);
      if (!vals.length) return 0;
      if (vals.every((v) => typeof v === "string")) return vals.length;
      let sum = 0;
      for (const v of vals) sum += countQuizLeaves(v);
      return sum;
    }

    /** مرحلة الإعدادية (ليس الابتدائية) */
    function isPreparatoryStageLabel(name) {
      const s = String(name);
      return s.includes("إعداد") || s.includes("اعداد");
    }

    function renderLandingStats() {
      const ul = document.getElementById("landing-stages-list");
      if (!ul || !indexData) return;
      ul.innerHTML = "";
      const stages = getIndexStages(indexData);
      for (const name of stages) {
        const n = countQuizLeaves(indexData[name]);
        const li = document.createElement("li");
        const wip =
          isPreparatoryStageLabel(name)
            ? '<p class="landing-wip">لسه بيتحضّرو — لم يُجهَّزوا بعد</p>'
            : "";
        li.innerHTML =
          '<div class="landing-stage-cell"><span class="landing-stage-title">' +
          escapeHtml(name) +
          "</span>" +
          wip +
          '</div><span class="landing-count"><strong>' +
          n +
          "</strong> تقييمات</span>";
        ul.appendChild(li);
      }
    }

    function setHeaderSelectMode() {
      const h = document.getElementById("header-desc");
      if (h) h.textContent = "اختر المرحلة ثم الصف والفصل والاختبار، ثم حل الأسئلة خطوة بخطوة.";
    }

    function initSelectors() {
      const sStage = document.getElementById("sel-stage");
      const sGrade = document.getElementById("sel-grade");
      const sTerm = document.getElementById("sel-term");
      const sQuiz = document.getElementById("sel-quiz");
      const btnStart = document.getElementById("btn-start");

      fillSelect(sStage, getIndexStages(indexData), "— اختر المرحلة —");
      sGrade.disabled = true;
      sTerm.disabled = true;
      sQuiz.disabled = true;
      fillSelect(sGrade, [], "— اختر الصف —");
      fillSelect(sTerm, [], "— اختر الفصل —");
      fillSelect(sQuiz, [], "— اختر الاختبار —");
      btnStart.disabled = true;

      sStage.addEventListener("change", () => {
        const st = sStage.value;
        fillSelect(sGrade, st ? getNestedKeys(indexData[st]) : [], "— اختر الصف —");
        sGrade.disabled = !st;
        fillSelect(sTerm, [], "— اختر الفصل —");
        fillSelect(sQuiz, [], "— اختر الاختبار —");
        sTerm.disabled = true;
        sQuiz.disabled = true;
        btnStart.disabled = true;
      });

      sGrade.addEventListener("change", () => {
        const st = sStage.value;
        const gr = sGrade.value;
        const terms = st && gr ? getNestedKeys(indexData[st][gr]) : [];
        fillSelect(sTerm, terms, "— اختر الفصل —");
        sTerm.disabled = !gr;
        fillSelect(sQuiz, [], "— اختر الاختبار —");
        sQuiz.disabled = true;
        btnStart.disabled = true;
      });

      sTerm.addEventListener("change", () => {
        const st = sStage.value;
        const gr = sGrade.value;
        const te = sTerm.value;
        const quizzes = st && gr && te ? getNestedKeys(indexData[st][gr][te]) : [];
        fillSelect(sQuiz, quizzes, "— اختر الاختبار —");
        sQuiz.disabled = !te;
        btnStart.disabled = true;
      });

      sQuiz.addEventListener("change", () => {
        btnStart.disabled = !sQuiz.value;
      });

      btnStart.addEventListener("click", async () => {
        const st = sStage.value;
        const gr = sGrade.value;
        const te = sTerm.value;
        const quizLabel = sQuiz.value;
        if (!st || !gr || !te || !quizLabel) return;
        const file = indexData[st][gr][te][quizLabel];
        try {
          currentQuizFile = file;
          const data = await loadQuiz(file);
          questions = normalizeLoadedQuiz(data);
          if (!questions.length) {
            setLoadError(
              "ملف الاختبار فارغ أو بتنسيق غير مدعوم: <code>" +
                escapeHtml(file) +
                "</code><br><small>التنسيقات المدعومة: كائن سؤال/إجابة (ابتدائي) أو مصفوفة أسئلة بحقول question و correct_answer و options.</small>"
            );
            return;
          }
          results = questions.map((q) => ({
            question: q.question,
            displayQuestion: q.displayQuestion,
            correctAnswer: q.answer,
            userAnswer: null,
            correct: null,
            choices: q.choices,
          }));
          currentIndex = 0;
          showScreen("screen-quiz");
          updateLiveScore();
          renderQuestion();
        } catch (e) {
          setLoadError("تعذر تحميل ملف الاختبار: " + file + "<br><small>" + String(e) + "</small>");
        }
      });
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      const total = questions.length;
      const pct = total ? ((currentIndex + 1) / total) * 100 : 0;
      document.getElementById("progress-fill").style.width = pct + "%";
      document.getElementById("progress-text").textContent =
        "سؤال " + (currentIndex + 1) + " من " + total;

      const qTextEl = document.getElementById("q-text");
      qTextEl.textContent = q.displayQuestion;
      applyTextDirection(qTextEl, q.displayQuestion);

      const fb = document.getElementById("feedback");
      fb.className = "feedback";
      fb.textContent = "";
      fb.removeAttribute("dir");
      fb.removeAttribute("lang");

      const mcq = document.getElementById("q-mcq");
      const tw = document.getElementById("q-text-wrap");
      const inp = document.getElementById("q-input");
      mcq.innerHTML = "";
      inp.value = "";
      inp.oninput = null;

      const res = results[currentIndex];

      if (q.choices) {
        tw.style.display = "none";
        q.choices.forEach((c) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "btn btn-choice";
          b.textContent = c;
          applyTextDirection(b, c);
          if (res.correct !== null) {
            b.disabled = true;
            if (norm(c) === norm(res.correctAnswer)) b.classList.add("correct");
            else if (norm(c) === norm(res.userAnswer) && !res.correct) b.classList.add("wrong");
          } else {
            b.addEventListener("click", () => onMcqPick(c, b));
          }
          mcq.appendChild(b);
        });
      } else {
        tw.style.display = "block";
        if (res.correct !== null) {
          inp.value = res.userAnswer ?? "";
          inp.disabled = true;
          applyTextDirection(inp, q.displayQuestion + " " + inp.value);
          document.getElementById("btn-check").style.display = "none";
          showFeedback(res);
        } else {
          inp.disabled = false;
          document.getElementById("btn-check").style.display = "block";
          applyTextDirection(inp, q.displayQuestion);
          inp.oninput = () => applyTextDirection(inp, q.displayQuestion + " " + inp.value);
        }
      }

      updateLiveScore();

      document.getElementById("btn-prev").disabled = currentIndex === 0;
      const answered = res.correct !== null;
      document.getElementById("btn-next").disabled = !answered;
      if (currentIndex === total - 1 && answered) {
        document.getElementById("btn-next").textContent = "عرض النتيجة";
      } else {
        document.getElementById("btn-next").textContent = "التالي";
      }
    }

    function showFeedback(res) {
      const fb = document.getElementById("feedback");
      fb.classList.add("show");
      if (res.correct) {
        fb.classList.add("ok");
        fb.textContent = "إجابة صحيحة! أحسنت.";
      } else {
        fb.classList.add("bad");
        fb.textContent =
          "إجابة غير صحيحة. الإجابة الصحيحة: " + String(res.correctAnswer);
      }
      applyTextDirection(fb, fb.textContent);
    }

    function onMcqPick(choice, btnEl) {
      const res = results[currentIndex];
      res.userAnswer = choice;
      res.correct = norm(choice) === norm(res.correctAnswer);
      const mcq = document.getElementById("q-mcq");
      Array.from(mcq.querySelectorAll(".btn-choice")).forEach((b) => {
        b.disabled = true;
        const t = b.textContent;
        if (norm(t) === norm(res.correctAnswer)) b.classList.add("correct");
        else if (b === btnEl && !res.correct) b.classList.add("wrong");
      });
      showFeedback(res);
      updateLiveScore();
      if (res.correct) playCorrectCelebration();
      document.getElementById("btn-next").disabled = false;
      if (currentIndex === questions.length - 1) {
        document.getElementById("btn-next").textContent = "عرض النتيجة";
      }
    }

    document.getElementById("btn-check").addEventListener("click", () => {
      const res = results[currentIndex];
      const inp = document.getElementById("q-input");
      const val = inp.value;
      res.userAnswer = val;
      res.correct = norm(val) === norm(res.correctAnswer);
      inp.disabled = true;
      document.getElementById("btn-check").style.display = "none";
      showFeedback(res);
      updateLiveScore();
      if (res.correct) playCorrectCelebration();
      document.getElementById("btn-next").disabled = false;
      if (currentIndex === questions.length - 1) {
        document.getElementById("btn-next").textContent = "عرض النتيجة";
      }
    });

    document.getElementById("btn-next").addEventListener("click", () => {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    });

    document.getElementById("btn-prev").addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    });

    function showResults() {
      const total = results.length;
      const correct = results.filter((r) => r.correct).length;
      const pct = total ? Math.round((correct / total) * 100) : 0;
      document.getElementById("score-line").textContent = correct + " / " + total;
      document.getElementById("score-sub").textContent = "نسبة النجاح: " + pct + "%";
      document.getElementById("score-circle").style.setProperty("--p", pct);
      document.getElementById("score-pct").textContent = pct + "%";

      const list = document.getElementById("review-list");
      list.innerHTML = "";
      results.forEach((r) => {
        const div = document.createElement("div");
        div.className = "review-item " + (r.correct ? "ok" : "bad");
        div.innerHTML =
          '<div class="review-q">' +
          escapeHtml(r.displayQuestion || r.question) +
          "</div>" +
          "<div>إجابتك: " +
          escapeHtml(String(r.userAnswer ?? "—")) +
          "</div>" +
          (!r.correct
            ? "<div>الصحيح: " + escapeHtml(String(r.correctAnswer)) + "</div>"
            : "");
        list.appendChild(div);
        const rq = div.querySelector(".review-q");
        if (rq) applyTextDirection(rq, r.displayQuestion || r.question);
      });

      showScreen("screen-result");
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("btn-restart").addEventListener("click", () => {
      document.getElementById("load-error").style.display = "none";
      setHeaderSelectMode();
      showScreen("screen-select");
    });

    document.getElementById("btn-enter-app").addEventListener("click", () => {
      setHeaderSelectMode();
      showScreen("screen-select");
    });

    document.getElementById("q-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("btn-check").click();
    });

    (async function boot() {
      try {
        indexData = await loadIndex();
        initSelectors();
        renderLandingStats();
        showScreen("screen-landing");
      } catch (e) {
        setLoadError(
          "لم يتم تحميل فهرس الاختبارات. إذا فتحت الملف مباشرة من القرص، المتصفح قد يمنع التحميل.<br>" +
            "<strong>الحل:</strong> شغّل <code>serve.bat</code> من نفس المجلد، ثم افتح في المتصفح:<br>" +
            "<code>http://127.0.0.1:8080</code><br><small>" +
            String(e) +
            "</small>"
        );
        document.getElementById("screen-landing")?.classList.remove("active");
        document.getElementById("screen-select")?.classList.remove("active");
      }
    })();
  </script>
</body>
</html>
